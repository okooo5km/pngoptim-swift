name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.check.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin,
            x86_64-apple-darwin,
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            x86_64-apple-ios

      - name: Cache Rust dependencies
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: |
            rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build XCFramework (full)
        if: steps.check.outputs.skip != 'true'
        run: bash scripts/build-xcframework.sh

      - name: Swift test
        if: steps.check.outputs.skip != 'true'
        run: swift test

      - name: Compute checksum
        if: steps.check.outputs.skip != 'true'
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum PNGOptimCore.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Checksum: $CHECKSUM"

      - name: Update Package.swift for release
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG="${GITHUB_REF_NAME}"
          CHECKSUM="${{ steps.checksum.outputs.checksum }}"

          # Set useLocalFramework = false for remote consumers
          sed -i '' 's/let useLocalFramework = true/let useLocalFramework = false/' Package.swift

          # Update download URL version
          sed -i '' "s|releases/download/v[0-9]*\.[0-9]*\.[0-9]*/|releases/download/${TAG}/|" Package.swift

          # Update checksum
          sed -i '' "s/checksum: \"[a-f0-9]*\"/checksum: \"${CHECKSUM}\"/" Package.swift

          echo "Updated Package.swift:"
          cat Package.swift

      - name: Commit and force-move tag
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG="${GITHUB_REF_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Package.swift
          git commit -m "chore: update Package.swift for ${TAG} release"
          git push origin HEAD:main

          git tag -f "$TAG"
          git push -f origin "$TAG"

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            PNGOptimCore.xcframework.zip

      - name: Print update instructions
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "================================================"
          echo "Release $TAG created successfully!"
          echo "  url: https://github.com/okooo5km/pngoptim-swift/releases/download/$TAG/PNGOptimCore.xcframework.zip"
          echo "  checksum: ${{ steps.checksum.outputs.checksum }}"
          echo "================================================"
