name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin,
            x86_64-apple-darwin,
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            x86_64-apple-ios

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build XCFramework (full)
        run: bash scripts/build-xcframework.sh

      - name: Swift test
        run: swift test

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum PNGOptimCore.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Checksum: $CHECKSUM"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            PNGOptimCore.xcframework.zip

      - name: Print update instructions
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "================================================"
          echo "Update Package.swift with:"
          echo "  url: https://github.com/okooo5km/pngoptim-swift/releases/download/$TAG/PNGOptimCore.xcframework.zip"
          echo "  checksum: ${{ steps.checksum.outputs.checksum }}"
          echo "================================================"
